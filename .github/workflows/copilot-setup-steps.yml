name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - tex/**/*.tex
      - scripts/06_emit_structure.py
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - tex/**/*.tex
      - scripts/06_emit_structure.py

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y texlive-full

      - name: Verify xelatex installation
        run: which xelatex

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          pip install -q pyyaml pillow google-cloud-vision
